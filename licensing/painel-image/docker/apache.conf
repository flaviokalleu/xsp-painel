<VirtualHost *:80>
    DocumentRoot /var/www/html

    DirectoryIndex bootstrap.php

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        # Sempre executa bootstrap antes de qualquer .php
        php_value auto_prepend_file /var/www/html/bootstrap.php

        # include_path com xsp:// para que require/include relativos
        # encontrem os arquivos cifrados automaticamente
        php_value include_path ".:xsp:///var/www/html"

        # Mapeia qualquer .php requisitado para o bootstrap (que redireciona via xsp://)
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_URI} \.php$
        RewriteRule ^ /bootstrap.php [L]

        # Bloqueia acesso direto a .enc, .so, .ini, .cache
        <FilesMatch "\.(enc|so|ini|cache|key|env)$">
            Require all denied
        </FilesMatch>
    </Directory>

    # Endpoint healthcheck (sem licença)
    <Location /healthz>
        SetHandler default-handler
        Require all granted
    </Location>

    # Header de segurança
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
