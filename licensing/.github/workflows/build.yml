name: Build & Release

on:
  push:
    branches: [main, master]
    tags:     ["v*"]
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build:
    name: Compilar install-server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false

      - name: Instalar zip
        run: sudo apt-get install -y zip

      - name: Gerar bundle.zip e compilar binário
        working-directory: licensing
        run: |
          zip -r bundle.zip \
            api-license \
            admin-dashboard \
            customer-portal \
            landing \
            builder \
            painel-image \
            xsp-loader \
            docker-compose.yml \
            Makefile \
            .env.example \
            install-painel.sh \
            Caddyfile

          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w" -o install-server install-server.go

          rm -f bundle.zip
          ls -lh install-server

      - name: Upload artefato (push no branch)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: install-server-linux-amd64
          path: licensing/install-server
          retention-days: 7

      - name: Criar GitHub Release (push de tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: licensing/install-server
          body: |
            ## XSP Licensing — ${{ github.ref_name }}

            ### Instalar na VPS (primeira vez)

            ```bash
            curl -fsSL https://github.com/flaviokalleu/Script-Painel-Office-Xtream-Server-Pro-V10-Com-Chatbot-Atual/releases/download/${{ github.ref_name }}/install-server -o install-server
            chmod +x install-server
            sudo ./install-server
            ```

            ### Atualizar VPS existente

            ```bash
            curl -fsSL https://github.com/flaviokalleu/Script-Painel-Office-Xtream-Server-Pro-V10-Com-Chatbot-Atual/releases/download/${{ github.ref_name }}/install-server -o install-server
            chmod +x install-server
            sudo ./install-server   # .env com segredos NÃO é sobrescrito
            ```
