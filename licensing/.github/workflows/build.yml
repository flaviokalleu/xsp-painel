name: Build & Publish Docker

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  packages: write   # necessário para publicar no ghcr.io

jobs:
  docker:
    name: Build e push imagem do instalador
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push
        uses: docker/build-push-action@v5
        with:
          context: licensing
          file: licensing/Dockerfile
          push: true
          tags: |
            ghcr.io/flaviokalleu/xsp-licensing:latest
            ghcr.io/flaviokalleu/xsp-licensing:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/flaviokalleu/xsp-licensing
            org.opencontainers.image.description=XSP Licensing — instalador do servidor central
            org.opencontainers.image.revision=${{ github.sha }}
